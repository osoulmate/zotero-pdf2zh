name: Build and Release Zotero Plugin

on:
  push:
    tags:
      - 'v*' # 只有推送 v 开头的 tag 时才会触发，例如 v3.1.0
  workflow_dispatch:

jobs:
  lint:
      runs-on: ubuntu-latest
      env:
          GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
      steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 0
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: 24
                # 为 plugin/package-lock.json 启用缓存
                cache: 'npm'
                cache-dependency-path: plugin/package-lock.json
          - name: Install deps
            run: |
                cd plugin/ && npm install
          - name: Run Lint
            run: |
                cd plugin/ && npm run lint:check
  build-and-release:
      runs-on: ubuntu-latest
      env:
          GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
      steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 0
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: 24
                # 为 plugin/package-lock.json 启用缓存
                cache: 'npm'
                cache-dependency-path: plugin/package-lock.json
          - name: Install deps
            run: |
                cd plugin/ && npm install
          - name: Run Build
            run: |
                cd plugin/ && npm run build

          # 直接将脚手架生成的 .xpi 文件发布到 GitHub Releases
          - name: Create GitHub Release
            uses: softprops/action-gh-release@v2
            if: startsWith(github.ref, 'refs/tags/')
            with:
              # 使用通配符匹配 build 目录下的所有 .xpi 文件
              files: build/*.xpi
              generate_release_notes: true